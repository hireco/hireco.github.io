<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>文件下载中心</title>
    <link rel="icon" type="image/png" href="../images/skin/favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>

<!-- 浮动导航 -->
<div class="float-nav">
    <div class="float-nav-toggle" onclick="toggleFloatNav()">
        <i class="ri-menu-line"></i>
    </div>
    <div class="float-nav-content">
        <a href="../index.html" class="nav-item" title="返回主页">
            <i class="ri-home-4-line"></i>
        </a>
        <a href="javascript:void(0)" class="nav-item" onclick="showDonate()" title="打赏">
            <i class="ri-hand-heart-line"></i>
        </a>
        <a href="javascript:void(0)" class="nav-item" onclick="logout()" title="退出">
            <i class="ri-logout-box-r-line"></i>
        </a>
    </div>
</div>

<!-- 打赏弹窗 -->
<div id="donate-modal" class="float-modal">
    <div class="modal-content">
        <iframe src="../donate.html" frameborder="0"></iframe>
        <button class="modal-close" onclick="closeDonate()">×</button>
    </div>
</div>

<!-- 动态背景粒子 -->
<div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
</div>

<div class="container">
    <!-- 登录区 -->
    <div id="login-box" class="glass-card">
        <div class="login-section">
            <div class="decoration-ring"></div>
            <div class="lock-icon">
                <i class="ri-lock-password-line"></i>
            </div>
            <h2 class="login-title">文件下载中心</h2>
            <p class="login-subtitle">输入访问密码解锁内容</p>

            <div class="input-wrapper">
                <input type="password" id="pwd-input" placeholder="请输入访问密码">
            </div>

            <button class="submit-btn" onclick="checkPassword()">
                <i class="ri-shield-check-line"></i>
                <span>解锁进入</span>
            </button>

            <div id="error-msg" class="error-msg">
                <i class="ri-error-warning-line"></i> 密码错误，请重试
            </div>

            <div class="divider">
                <span>扫码获取密码</span>
            </div>

            <div class="wechat-section">
                <div class="wechat-card">
                    <img src="images/erweima.jpg" alt="微信公众号二维码">
                    <p class="wechat-hint">关注后发送 <strong>"下载密码"</strong></p>
                </div>
            </div>
        </div>
    </div>

    <!-- 主内容区 -->
    <div id="main-content" class="glass-card main-section">
        <div class="main-header">
            <h1><i class="ri-download-cloud-2-line"></i> 文件下载中心</h1>
            <p>所有资源均可免费下载</p>
            <button class="logout-btn" onclick="logout()"><i class="ri-logout-box-r-line"></i> 退出</button>
        </div>
        <div class="main-content">
            <div class="breadcrumb">
                <i class="ri-folder-line"></i>
                <span id="breadcrumb-text">当前位置: /</span>
            </div>
            <ul id="file-list" class="file-list">
                <li class="loading"><i class="ri-loader-4-line"></i><br>正在加载...</li>
            </ul>
        </div>
    </div>
</div>

<script src="js/main.js"></script>
<script>
    // 页面加载时检查登录状态
    document.addEventListener('DOMContentLoaded', function() {
        initAuth();
    });

    // 浮动导航
    function toggleFloatNav() {
        var nav = document.querySelector('.float-nav');
        nav.classList.toggle('collapsed');
    }

    // 显示打赏弹窗
    function showDonate() {
        var modal = document.getElementById('donate-modal');
        modal.style.display = 'flex';
        setTimeout(function() {
            modal.classList.add('active');
        }, 10);
    }

    // 关闭打赏弹窗
    function closeDonate() {
        var modal = document.getElementById('donate-modal');
        modal.classList.remove('active');
        setTimeout(function() {
            modal.style.display = 'none';
        }, 300);
    }

    // 点击弹窗背景关闭
    document.addEventListener('click', function(e) {
        var modal = document.getElementById('donate-modal');
        if (e.target === modal) {
            closeDonate();
        }
    });
</script>

</body>
</html>
