<script class="directAccess" src="directAccess.js"></script>

<div class="page-title">
  <div><span class="glyphicon glyphicon-tags"></span> 标签</div>
</div>

<div class="blog hidden"></div>
<div class="categories">
  <ul class="tag-cloud" id="tag-cloud"></ul>
</div>
<div class="noEntryFound">
  <span class="glyphicon glyphicon-info-sign"></span>
  <span>No entry exists with this tag<span>
</div>

<script>

$(function(){
  
  let hash = window.location.hash.split('/');
  let articles = [];
  
  // 加载文章数据
  function loadArticles(callback) {
    try {
      if (typeof articles !== 'undefined' && articles.length > 0) {
        callback(articles);
      } else {
        $.getJSON('data/blog.json', function(data) {
          articles = data;
          callback(articles);
        });
      }
    } catch(err) {
      $.getJSON('data/blog.json', function(data) {
        articles = data;
        callback(articles);
      });
    }
  }
  
  if(hash[2]) {
    loadArticles(function(data) {
      articleListWithTag(data, decodeURI(hash[2]));
    });
  } else {
    loadArticles(function(data) {
      tagList(data);
    });
  }
  
  function articleListWithTag(data, tag) {
    $('.page-title div').html('<span class="glyphicon glyphicon-tags"></span> 标签 <span class="path-sep">&gt;</span> ' + tag);
    $('.tags-container').hide();
    $('.blog').hide();
    $('.noEntryFound').show();
    
    $.each(data, function(i, item) {
      if($.inArray(tag, item.tags) >= 0) {
        $('.blog').append('<div><h4><a href="#blog/article/' + item.id.toLowerCase() + '">'+item.topic+'</a> <small><i>'+item.date+'</i></small></h4><p>'+item.abstract+'</p></div>');
      }
    });
    
    if($('.blog div').length) {
      $('.blog').removeClass('hidden').show();
      $('.noEntryFound').hide();
    }
  }
  
  function tagList(data) {
    $('.categories').show();
    let tags = {};
    
    // 统计每个标签的文章数量
    $.each(data, function(i, item) {
      if (item.tags && item.visible !== false) {
        $.each(item.tags, function(j, tag) {
          tags[tag] = (tags[tag] || 0) + 1;
        });
      }
    });
    
    // 转换为数组并排序
    let tagArray = Object.keys(tags).map(function(tag) {
      return { name: tag, count: tags[tag] };
    });
    
    // 按文章数量降序排列
    tagArray.sort(function(a, b) { return b.count - a.count; });
    
    // 获取最大和最小数量用于计算大小
    let maxCount = tagArray.length > 0 ? tagArray[0].count : 1;
    let minCount = tagArray.length > 0 ? tagArray[tagArray.length - 1].count : 1;
    
    // 颜色主题
    let themes = ['theme-1', 'theme-2', 'theme-3', 'theme-4', 'theme-5', 'theme-6', 'theme-7', 'theme-8'];
    
    // 生成标签云
    $.each(tagArray, function(i, item) {
      // 计算相对大小 (1-3)
      let ratio = (item.count - minCount + 1) / (maxCount - minCount + 1);
      let size;
      if (ratio > 0.66) {
        size = 'size-lg';
      } else if (ratio > 0.33) {
        size = 'size-md';
      } else {
        size = 'size-sm';
      }
      
      let theme = themes[i % themes.length];
      let displayCount = item.count > 1 ? ' (' + item.count + ')' : '';
      
      $('#tag-cloud').append(
        '<a href="#blog/tag/' + encodeURIComponent(item.name) + '" class="tag-item ' + theme + ' ' + size + '">' +
        item.name + displayCount +
        '</a>'
      );
    });
  }
})

</script>
