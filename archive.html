<script class="directAccess" src="directAccess.js"></script>

<div class="blog hidden"></div>
<div class="categories">
  <div><span class="glyphicon glyphicon-folder-open"></span> 归档</div>
  <ul></ul>
</div>
<div class="noEntryFound">
  <span class="glyphicon glyphicon-info-sign"></span>
  <span>暂无归档日志</span>
</div>

<script>

$(function(){
  
  let hash = window.location.hash.split('/');
  
  if(hash[1] && /^\d{4}$/.test(hash[1])) {
    // 如果带了年份参数，重定向到 year.html
    window.location.hash = '#year/' + hash[1];
    return;
  }
  
  // 显示归档年份列表
  $.ajax({
    type: 'get',
    dataType: 'json',
    url: 'data/archive.json',
    success: function(data) {
      if (data && data.length > 0) {
        // 降序排列，最新年份在前
        data.sort().reverse();
        for(var year of data) {
          $('.categories ul').append('<li><a href="#year/'+year+'"><span class="glyphicon glyphicon-folder-close"></span> '+year+' 年</a></li>');
        }
        $('.categories').show();
      } else {
        $('.noEntryFound span').text('暂无归档日志');
        $('.noEntryFound').show();
      }
    },
    error: function() {
      $('.noEntryFound span').text('暂无归档日志');
      $('.noEntryFound').show();
    }
  });
  
})

</script>
