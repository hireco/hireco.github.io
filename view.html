<script class="directAccess" src="directAccess.js"></script>
<div class="article hidden">
	<div class="articleHeader">
		<span class="glyphicon glyphicon-calendar"></span>
		<span class="myDate"></span><span class="glyphicon glyphicon-th-list"></span>
		<span class="myCategory"></span>
	</div>
	<div class="articleBody editormd-preview-theme-dark">
	   <div id="articleContent"></div>
	</div>
	<div class="articleFooter">
	  <p>
	    <span class="glyphicon glyphicon-tags"></span>
		<span class="myTags"></span>
	  </p>
	  <p class="prevNext"></p>
	</div>
</div>

<script>

var articles = [];

$(function(){

  let hash = window.location.hash.split('/');
  
  if(hash[1]) {
   
    // 先检查文章是否存在于归档中
    $.ajax({
      type: 'get',
      dataType: 'json',
      url: 'data/archive.json',
      success: function(archiveYears) {
        findArticleInArchives(archiveYears || [], hash[1]);
      },
      error: function() {
        window.location.hash = '404';
      }
    });
  
  } 
  else window.location.hash = '404';
  
  function findArticleInArchives(years, articleId) {
    if (years.length === 0) {
      window.location.hash = '404';
      return;
    }
    
    var year = years.shift();
    $.ajax({
      type: 'get',
      dataType: 'json',
      url: 'data/archive/' + year + '.json',
      success: function(data) {
        var found = false;
        for (var i = 0; i < data.length; i++) {
          if (data[i].id.toLowerCase() === articleId.toLowerCase()) {
            found = true;
            articles = data;
            loadArticleContent(articleId);
            break;
          }
        }
        if (!found) {
          findArticleInArchives(years, articleId);
        }
      },
      error: function() {
        findArticleInArchives(years, articleId);
      }
    });
  }
  
  function loadArticleContent(articleId) {
    $.ajax({
      type: 'get',
      dataType: 'text',
      url:'data/articles/' + articleId + '.md',
      success: function(data){
        
        var testView = editormd.markdownToHTML("articleContent", {
          markdown   : data,
          htmlDecode : 'div',
          tex        : true
        });
        
        $('#articleContent a[href^="http"]').each(function() {
          $(this).attr('target', '_blank');
        });

        setArticleInfo(articles, articleId);
        
        $('.article').removeClass('hidden');
        
      },
      error: function () {
        window.location.hash='404';
      }
    });
  }
  
  function setArticleInfo(articles, articleId) {
      
	  let prevId,nextId;
	  
	  $.each(articles,function(i,item){
		 if(item.id.toLowerCase()==articleId.toLowerCase()) {
			
			$('.myDate').text(articles[i].date);
			$('.myCategory').text(articles[i].category || '');
			
			for(var tag of (articles[i].tags || [])) {
			   $('.myTags').append('<span class="myTag">'+tag+'</span>');
			}
			
			if(i>0){
			   prevId = articles[i-1].id.toLowerCase();
			   $('.prevNext').append('<p>Prev: <a href="#view/' + prevId + '">' + articles[i-1].topic + '</a></p>');
			}
			if(i<articles.length-1) {
			   nextId = articles[i+1].id.toLowerCase();
			   $('.prevNext').append('<p>Next: <a href="#view/' + nextId + '">' + articles[i+1].topic + '</a></p>');
			}
			
			return false;
		 }
	  }); 
  }
  
})

</script>
