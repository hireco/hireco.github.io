<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>打赏支持</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .donate-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 320px;
        }
        .donate-title {
            color: #333;
            font-size: 24px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .donate-title i {
            color: #ff6b6b;
        }
        .qrcode {
            width: 200px;
            height: 200px;
            border-radius: 12px;
            margin: 0 auto 20px;
            border: 3px solid #f0f0f0;
        }
        .donate-hint {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }
        .close-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .close-btn:hover {
            background: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    <button class="close-btn" onclick="window.close()">×</button>
    <div class="donate-card">
        <h2 class="donate-title"><i class="ri-heart-fill"></i> 打赏支持</h2>
        <img src="../images/donateMe.png" alt="微信赞赏码" class="qrcode" onerror="this.outerHTML='<div style=width:200px;height:200px;background:#f5f5f5;border-radius:12px;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;color:#999;font-size:14px;>请上传 donateMe.png</div>'">
        <p class="donate-hint">感谢您的支持！<br>您的鼓励是我前进的动力</p>
    </div>
</body>
</html>
